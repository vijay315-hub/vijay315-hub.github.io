<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Details</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f8;
    color:#111827;
}

/* HEADER */
header{
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    color:white;
    padding:20px;
    text-align:center;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
}

/* CARD */
.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* TITLE */
.card h2{
    margin-bottom:10px;
    color:#111827;
}

/* DESCRIPTION */
.card p{
    color:#374151;
    line-height:1.6;
}

/* DATE BADGE */
.date{
    display:inline-block;
    margin:10px 0;
    padding:5px 10px;
    background:#dcfce7;
    color:#166534;
    border-radius:6px;
    font-size:13px;
}

/* BUTTON BASE */
/* .btn{
    display:inline-block;
    margin-top:15px;
    margin-right:10px;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
} */

/* APPLY BUTTON */
.apply-btn{
    background:#22c55e;
    color:white;
}

.apply-btn:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

/* PDF BUTTON */
.pdf-btn{
    background:#2563eb;
    color:white;
}

.pdf-btn:hover{
    background:#1e3a8a;
    transform:translateY(-2px);
}

/* BACK LINK */
.back-btn{
    display:inline-block;
    padding:8px 14px;
    margin-bottom:20px;
    background:#111827;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.back-btn:hover{
    background:#22c55e;
}
.detail-box{
    background:#1f2937;
    padding:20px;
    margin-top:20px;
    border-radius:12px;
    color:#d1d5db;
    line-height:1.8;
}

.detail-box h3{
    color:white;
    margin-bottom:10px;
}

.detail-box ul,
.detail-box ol{
    padding-left:20px;
} 
 .btn{
    display:inline-block;
    margin-top:10px;
    margin-right:10px;
    padding:10px 16px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#1e40af;
}   
</style>
</head>

<body>

<div class="container">

  <a class="back-btn" href="index.html">⬅ Back to Home</a>

  <div id="jobDetail">Loading job details...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);

    if(!rows[id]){
        document.getElementById("jobDetail").innerHTML = "Job not found ❌";
        return;
    }

    let cols = rows[id].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    let title = cols[0] || "No Title";
    let desc = cols[1] || "";
    let link = cols[2] || "#";
    let date = cols[3] || "";
    let pdf  = cols[4] || "#";
    let edu = cols[5] || "Not Mentioned";
    let age = cols[6] || "Not Mentioned";
    let salary = cols[7] || "Not Mentioned";
    let location = cols[8] || "India";
 
    document.getElementById("jobDetail").innerHTML = `

<h2>${title}</h2>

<p>${desc}</p>

<div class="detail-box">

<h3>Job Overview</h3>

<p><b>📚 Education:</b> ${edu}</p>

<p><b>🎂 Age Limit:</b> ${age}</p>

<p><b>💰 Salary:</b> ${salary}</p>

<p><b>📍 Location:</b> ${location}</p>

<p><b>📅 Date:</b> ${date}</p>

</div>

<div class="detail-box">

<h3>Selection Process</h3>

<ul>
<li>Written Exam</li>
<li>Document Verification</li>
<li>Medical Test</li>
</ul>

</div>

<div class="detail-box">

<h3>How To Apply</h3>

<ol>
<li>Read official notification carefully</li>
<li>Click Apply Now button</li>
<li>Fill online form</li>
<li>Upload required documents</li>
<li>Submit form before last date</li>
</ol>

</div>

<div class="detail-box">

<h3>Important Links</h3>

<a class="btn" href="${link || '#'}" target="_blank">
🚀 Apply Now
</a>

<a class="btn" href="${pdf || '#'}" target="_blank">
📄 Download PDF
</a>

</div>
`;
})
.catch(err => {
    document.getElementById("jobDetail").innerHTML = "Error loading job ❌";
    console.log(err);
});

</script>
</body>
</html>
