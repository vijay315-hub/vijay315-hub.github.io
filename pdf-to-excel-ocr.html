<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to Excel OCR Converter</title>

<meta name="description" content="Convert PDF files into Excel format using OCR technology.">

<meta name="keywords" content="PDF to Excel, OCR converter, PDF Excel tool">

<link rel="canonical" href="https://vijay315-hub.github.io/pdf-to-excel-ocr.html">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:850px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    margin-top:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#111827;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#22c55e;
}

textarea{
    width:100%;
    height:300px;
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#111827;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#22c55e;
}

footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<header>

<h1>📊 PDF to Excel OCR Converter</h1>

<p>
Convert PDF text into Excel spreadsheet
</p>

</header>

<div class="container">

<input
type="file"
id="pdfFile"
accept="application/pdf">

<button onclick="convertPDFToExcel()">

Convert PDF to Excel

</button>

<textarea
id="result"
placeholder="Extracted text will appear here...">
</textarea>

<div style="text-align:center;">

<a class="btn"
href="#"
onclick="downloadExcel()">

⬇ Download Excel File

</a>

</div>

<div style="text-align:center;">

<a class="btn"
href="pdf-tools.html">

⬅ Back to PDF Tools

</a>

</div>

</div>

<footer>

© 2026 Vijay Job Portal

</footer>

<script>

let extractedText = "";

async function convertPDFToExcel(){

    const file =
    document.getElementById("pdfFile").files[0];

    if(!file){

        alert("Please select PDF file");

        return;
    }

    document.getElementById("result").value =
    "Processing OCR... Please wait.";

    const fileReader = new FileReader();

    fileReader.onload = async function(){

        const typedarray =
        new Uint8Array(this.result);

        const pdf =
        await pdfjsLib.getDocument(
            typedarray
        ).promise;

        extractedText = "";

        for(let i=1; i<=pdf.numPages; i++){

            const page =
            await pdf.getPage(i);

            const viewport =
            page.getViewport({ scale:2 });

            const canvas =
            document.createElement("canvas");

            const context =
            canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext:context,
                viewport:viewport
            }).promise;

            const image =
            canvas.toDataURL("image/png");

            const {
                data:{ text }
            } = await Tesseract.recognize(
                image,
                'eng'
            );

            extractedText += text + "\n";
        }

        document.getElementById("result").value =
        extractedText;
    }

    fileReader.readAsArrayBuffer(file);
}

/* DOWNLOAD EXCEL */

function downloadExcel(){

    if(extractedText.trim() === ""){

        alert("No data found");

        return;
    }

    let rows =
    extractedText
    .split("\n")
    .map(line => [line]);

    let worksheet =
    XLSX.utils.aoa_to_sheet(rows);

    let workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "PDF Data"
    );

    XLSX.writeFile(
        workbook,
        "pdf-to-excel.xlsx"
    );
}

</script>

</body>
</html>
