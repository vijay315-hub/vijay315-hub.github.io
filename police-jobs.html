<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Police Government Jobs 2026 | Latest Police Vacancy India</title>
<meta name="description" content="Get latest police SI jobs in India including sub inspector recruitment, state police vacancy and central police jobs.">
<meta name="keywords" content="police SI jobs, sub inspector recruitment, police vacancy 2026, SI jobs India, latest police jobs">
<link rel="canonical" href="https://vijay315-hub.github.io/police-jobs.html">  
<meta name="robots" content="index, follow">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
header{background:#111827;color:white;padding:20px;text-align:center;}
.container{width:90%;max-width:850px;margin:auto;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{background:#111827;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;}
</style>
</head>

<body>

<header>
<h1>Police Government Jobs 2026</h1>
<p>Latest Police vacancies in India</p>
</header>

<div class="container" id="jobs">Loading...</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    let rows = data.split("\n").slice(1);
    let html = "";

    rows.forEach(row=>{
        let col = row.split(",");
        if(col[0].toLowerCase().includes("police") || col[0].toLowerCase().includes("si")){
            html += `
            <div class="card">
              <h3>${col[0]}</h3>
              <p>${col[1]}</p>
              <a class="btn" href="${col[2]}" target="_blank">Apply</a>
            </div>`;
        }
    });

    document.getElementById("jobs").innerHTML = html || "No Police Jobs Found";
});
</script>

</body>
</html>
