<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Product Details | Vijay Job Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    margin:0;
    padding:0;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

/* NAVBAR */

.navbar{
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
}

.logo img{
    height:40px;
}

.nav-links{
    display:flex;
    align-items:center;
}

.nav-links a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-size:14px;
}

.nav-links a:hover{
    color:#22c55e;
}

/* PRODUCT */

.product-container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.product-layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.product-image img{
    width:100%;
    border-radius:12px;
}

.product-info h1{
    font-size:30px;
    margin-bottom:15px;
}

.price{
    color:#16a34a;
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

.old-price{
    text-decoration:line-through;
    color:gray;
    font-size:18px;
    margin-left:10px;
}

.product-info p{
    line-height:1.8;
    color:#444;
    margin-bottom:15px;
}

.buy-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#111827;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.buy-btn:hover{
    background:#22c55e;
}

/* FOOTER */

.footer{
    background:#111827;
    color:white;
    padding:40px 20px;
    text-align:center;
    width:100%;

}

.footer p{
    color:#cbd5e1;
    line-height:1.8;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
    flex-direction:column;
    align-items:flex-start;
}

.nav-links{
    display:flex;
    flex-direction:column;
    width:100%;
    margin-top:10px;
}

.nav-links a{
    margin:8px 0;
}

.product-layout{
    grid-template-columns:1fr;
}

.product-info h1{
    font-size:24px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<a href="index.html">
<img src="logo.png" alt="Logo">
</a>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="latest-jobs.html">Latest Jobs</a>
<a href="tools.html">Tools</a>
<a href="student-deals.html">Deals</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<!-- PRODUCT -->

<div class="product-container">

<div class="product-layout">

<div class="product-image">
<img id="productImage" onerror="this.src='https://via.placeholder.com/500x400?text=No+Image'">
</div>

<div class="product-info">

<h1 id="productTitle"></h1>

<div class="price" id="productPrice"></div>

<p id="productDescription"></p>

<a id="buyBtn"
target="_blank"
class="buy-btn">
Buy Now
</a>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="footer">

<p>
⚠ Disclaimer: Some links may be affiliate links.
We may earn commission when you purchase through these links.
</p>

<br>

<p>
© 2026 Vijay Job Portal
</p>

</footer>

<script>

/* GOOGLE SHEET CSV URL */

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").slice(1);

let products = [];

rows.forEach(row => {

let cols = row.split(",");

products.push({

id: cols[0] || "",
title: cols[1] || "",
image: cols[2] || "",
price: cols[3] || "",
oldprice: cols[4] || "",
description: cols[5] || "",
category: cols[6] || "",
affiliate: cols[7] || ""

});

});

/* GET ID */

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

/* FIND PRODUCT */

const product = products.find(p => p.id == id);

/* SHOW PRODUCT */

if(product){

document.getElementById("productTitle")
.innerText = product.title;

document.getElementById("productPrice")
.innerHTML = `${product.price}
<span class="old-price">${product.oldprice}</span>`;

document.getElementById("productImage")
.src = product.image;

document.getElementById("productDescription")
.innerText = product.description;

document.getElementById("buyBtn")
.href = product.affiliate;

document.title = product.title + " | Vijay Job Portal";

}

});

</script>

</body>
</html>
