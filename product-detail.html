<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details | Vijay Job Portal</title>

<meta name="description"
content="Best student product deals with affiliate links.">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* FIX FOOTER GAP */

html{
    height:100%;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    overflow-x:hidden;
}

main{
    flex:1;
}

/* NAVBAR */

.navbar{
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
}

.logo img{
    height:40px;
}

.nav-links{
    display:flex;
    align-items:center;
}

.nav-links a{
    color:white;
    margin-left:20px;
    text-decoration:none;
    font-size:14px;
}

.nav-links a:hover{
    color:#22c55e;
}

/* PRODUCT CONTAINER */

.product-container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
    background:white;
    border-radius:12px;
    padding:25px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.product-image img{
    width:100%;
    height:400px;
    object-fit:contain;
    border-radius:10px;
    background:white;
}

.product-details h1{
    font-size:32px;
    margin-bottom:20px;
    color:#111827;
}

.price{
    color:#16a34a;
    font-size:30px;
    font-weight:bold;
    margin-bottom:10px;
}

.old-price{
    color:gray;
    text-decoration:line-through;
    font-size:18px;
    margin-left:10px;
}

.description{
    margin-top:20px;
    line-height:1.8;
    color:#374151;
    font-size:16px;
}

/* BUTTON */

.buy-btn{
    display:inline-block;
    margin-top:25px;
    background:#111827;
    color:white;
    padding:14px 22px;
    border-radius:8px;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.buy-btn:hover{
    background:#22c55e;
}

/* FOOTER */

.footer{
    background:#111827;
    color:white;
    padding:40px 20px;
    text-align:center;
    margin-top:auto;
}

.footer p{
    color:#cbd5e1;
    line-height:1.8;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
    flex-direction:column;
    align-items:flex-start;
}

.nav-links{
    display:flex;
    flex-direction:column;
    width:100%;
    margin-top:10px;
}

.nav-links a{
    margin:8px 0;
}

.product-container{
    grid-template-columns:1fr;
}

.product-image img{
    height:280px;
}

.product-details h1{
    font-size:24px;
}

.price{
    font-size:24px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<a href="index.html">
<img src="logo.png" alt="Logo">
</a>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="latest-jobs.html">Latest Jobs</a>
<a href="tools.html">Tools</a>
<a href="blog.html">Blog</a>
<a href="student-deals.html">Deals</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<main>

<!-- PRODUCT -->

<div class="product-container">

<div class="product-image">

<img id="productImage"
onerror="this.src='https://via.placeholder.com/500x400?text=No+Image'">

</div>

<div class="product-details">

<h1 id="productTitle">
Loading...
</h1>

<div class="price">

<span id="productPrice"></span>

<span class="old-price"
id="productOldPrice"></span>

</div>

<p class="description"
id="productDescription">
Loading product details...
</p>

<a id="buyBtn"
class="buy-btn"
target="_blank">

Buy Now

</a>

</div>

</div>

</main>

<!-- FOOTER -->

<footer class="footer">

<p>
⚠ Disclaimer:
Some links may be affiliate links.
We may earn commission when you purchase through these links.
</p>

<br>

<p>
© 2026 Vijay Job Portal
</p>

</footer>

<script>

/* GOOGLE SHEET */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

/* GET PRODUCT ID */

const params =
new URLSearchParams(window.location.search);

const productId =
params.get("id");

/* FETCH DATA */

fetch(sheetURL)

.then(res => res.text())

.then(data => {

let rows =
data.trim().split("\n").slice(1);

let products = [];

rows.forEach(row => {

let cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols) return;

products.push({

id: cols[0]?.replace(/"/g,"") || "",

title: cols[1]?.replace(/"/g,"") || "",

image: cols[2]?.replace(/"/g,"") || "",

price: cols[3]?.replace(/"/g,"") || "",

oldprice: cols[4]?.replace(/"/g,"") || "",

description: cols[5]?.replace(/"/g,"") || "",

category: cols[6]?.replace(/"/g,"") || "",

affiliate: cols[7]?.replace(/"/g,"") || ""

});

});

/* FIND PRODUCT */

let product =
products.find(p => p.id === productId);

if(product){

document.getElementById("productImage")
.src = product.image;

document.getElementById("productTitle")
.innerText = product.title;

document.getElementById("productPrice")
.innerText = product.price;

document.getElementById("productOldPrice")
.innerText = product.oldprice;

document.getElementById("productDescription")
.innerText = product.description;

document.getElementById("buyBtn")
.href = product.affiliate;

/* DYNAMIC PAGE TITLE */

document.title =
product.title + " | Vijay Job Portal";

}else{

document.querySelector(".product-container")
.innerHTML = "<h2>Product Not Found</h2>";

}

});

</script>

</body>
</html>
