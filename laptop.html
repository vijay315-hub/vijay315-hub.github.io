<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Best Student Laptop Deals 2026 | Vijay Job Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
height:100%;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
font-family:Arial,sans-serif;
background:#f5f5f5;
overflow-x:hidden;
}

main{
flex:1;
}

/* NAVBAR */

.navbar{
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
}

.logo img{
height:40px;
}

.nav-links{
display:flex;
align-items:center;
}

.nav-links a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

.nav-links a:hover{
color:#22c55e;
}

/* HEADER */

header{
background:#111827;
color:white;
padding:40px 20px;
text-align:center;
}

header p{
margin-top:10px;
color:#d1d5db;
}

/* BUTTON */

.btn{
display:inline-block;
margin:5px;
padding:8px 14px;
background:#111827;
color:white;
border-radius:8px;
text-decoration:none;
border:none;
cursor:pointer;
}

.btn:hover{
background:#22c55e;
}

/* SEARCH */

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:50%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

/* PRODUCT GRID */

.product-grid{
width:90%;
max-width:1200px;
margin:20px auto 40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* PRODUCT */

.product-box{
background:white;
border-radius:12px;
padding:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
justify-content:space-between;
min-height:360px;
}

.product-box img{
width:100%;
height:180px;
object-fit:contain;
background:white;
border-radius:8px;
}

.product-box h3{
font-size:16px;
margin:12px 0;
min-height:45px;
}

.price{
color:#16a34a;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.old-price{
color:gray;
text-decoration:line-through;
font-size:13px;
margin-left:5px;
}

/* BUTTON */

.buy-btn{
display:block;
background:#111827;
color:white;
padding:10px;
border-radius:7px;
text-decoration:none;
}

.buy-btn:hover{
background:#22c55e;
}

/* FOOTER */

.footer{
background:#111827;
color:white;
padding:40px 20px;
text-align:center;
margin-top:auto;
}

.footer p{
color:#cbd5e1;
line-height:1.8;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
flex-direction:column;
align-items:flex-start;
}

.nav-links{
display:flex;
flex-direction:column;
width:100%;
margin-top:10px;
}

.nav-links a{
margin:8px 0;
}

.search-box input{
width:90%;
margin-bottom:10px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<a href="index.html">
<img src="logo.png">
</a>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="student-deals.html">Deals</a>
<a href="blog.html">Blog</a>
<a href="contact.html">Contact</a>
</div>

</nav>

<!-- HEADER -->

<header>

<h1>Best Student Laptop Deals 2026</h1>  

<p>
Find laptops, headphones, watches and study products.
</p>

</header>

<main>

<!-- CATEGORY -->

<div style="text-align:center; margin:15px;">

<button class="btn filter-btn" data-category="all">
All
</button>

<button class="btn filter-btn" data-category="laptop">
Laptop
</button>

<button class="btn filter-btn" data-category="headphone">
Headphones
</button>

<button class="btn filter-btn" data-category="watch">
Watch
</button>

<button class="btn filter-btn" data-category="study">
Study
</button>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="productSearch"
placeholder="Search products...">

<button class="btn"
onclick="searchProducts()">
Search
</button>

</div>
<div style="text-align:center; margin-bottom:20px;">

<button class="btn price-btn"
data-price="30000">

Under ₹30000

</button>

<button class="btn price-btn"
data-price="50000">

Under ₹50000

</button>

<button class="btn price-btn"
data-price="70000">

Under ₹70000

</button>

<button class="btn price-btn"
data-price="all">

All Laptops

</button>

</div>
<!-- PRODUCTS -->

<div class="product-grid"
id="productGrid">

Loading Products...

</div>

</main>

<!-- FOOTER -->

<footer class="footer">

<p>
⚠ Disclaimer:
Some links may be affiliate links.
</p>

<br>

<p>
© 2026 Vijay Job Portal
</p>

</footer>

<script>

/* GOOGLE SHEET */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

let allProducts = [];

/* FETCH */

fetch(sheetURL)

.then(res => res.text())

.then(data => {

let rows =
data.trim().split("\n").slice(1);

rows.forEach(row => {

let cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols) return;

allProducts.push({

id: cols[0]?.replace(/"/g,"") || "",
title: cols[1]?.replace(/"/g,"") || "",

image1: cols[2]?.replace(/"/g,"") || "",

image2: cols[3]?.replace(/"/g,"") || "",

image3: cols[4]?.replace(/"/g,"") || "",

price: cols[5]?.replace(/"/g,"") || "",

oldprice: cols[6]?.replace(/"/g,"") || "",

description: cols[7]?.replace(/"/g,"") || "",

category: cols[8]?.replace(/"/g,"") || "",

affiliate: cols[9]?.replace(/"/g,"") || ""

});

});

let laptops =
allProducts.filter(product =>

product.category.toLowerCase() === "laptop"

);

renderProducts(laptops);

});

/* RENDER */

function renderProducts(products){

let html = "";

products.forEach(product => {

html += `

<div class="product-box">

<img src="${product.image1}"
onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">

<h3>${product.title}</h3>

<div class="price">

${product.price}

<span class="old-price">
${product.oldprice}
</span>

</div>

<a href="product-detail.html?id=${product.id}"
class="buy-btn">

View Deal

</a>

</div>

`;

});

document.getElementById("productGrid")
.innerHTML = html;

}

/* SEARCH */

function searchProducts(){

let value =
document.getElementById("productSearch")
.value.toLowerCase();

let filtered =
allProducts.filter(product =>

product.title.toLowerCase()
.includes(value)

);

renderProducts(filtered);

}

/* ENTER SEARCH */

document.getElementById("productSearch")
.addEventListener("keyup", function(event){

if(event.key === "Enter"){
searchProducts();
}

});

/* CATEGORY */

document.querySelectorAll(".filter-btn")
.forEach(button => {

button.addEventListener("click", function(){

let category = this.dataset.category;

if(category === "all"){

renderProducts(allProducts);

}else{

let filtered =
allProducts.filter(product =>

product.category.toLowerCase()
=== category

);

renderProducts(filtered);

}

});

});
  
/* PRICE FILTER */

document.querySelectorAll(".price-btn")
.forEach(button => {

button.addEventListener("click", function(){

let maxPrice =
this.dataset.price;

if(maxPrice === "all"){

let laptops =
allProducts.filter(product =>

product.category.toLowerCase()
=== "laptop"

);

renderProducts(laptops);

}else{

let filtered =
allProducts.filter(product => {

let price =
parseInt(
product.price.replace(/[^\d]/g,'')
);

return product.category.toLowerCase()
=== "laptop"

&& price <= parseInt(maxPrice);

});

renderProducts(filtered);

}

});

});
</script>

</body>
</html>
