<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF to Excel Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:850px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input{
    width:100%;
    margin-top:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#111827;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#22c55e;
}

textarea{
    width:100%;
    height:250px;
    margin-top:20px;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#111827;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

.btn:hover{
    background:#22c55e;
}

footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<header>

<h1>📊 PDF to Excel Converter</h1>

<p>
Convert PDF text into Excel file
</p>

</header>

<div class="container">

<input
type="file"
id="pdfFile"
accept="application/pdf">

<button onclick="convertPDF()">

Convert PDF

</button>

<textarea
id="preview"
placeholder="PDF text preview...">
</textarea>

<div style="text-align:center;">

<a class="btn"
href="#"
onclick="downloadExcel()">

⬇ Download Excel

</a>

</div>

<div style="text-align:center;">

<a class="btn"
href="pdf-tools.html">

⬅ Back to PDF Tools

</a>

</div>

</div>

<footer>

© 2026 Vijay Job Portal

</footer>

<script>

let excelData = [];

async function convertPDF(){

    const file =
    document.getElementById("pdfFile").files[0];

    if(!file){

        alert("Select PDF File");

        return;
    }

    const reader =
    new FileReader();

    reader.onload = async function(){

        const typedarray =
        new Uint8Array(this.result);

        const pdf =
        await pdfjsLib.getDocument(
            typedarray
        ).promise;

        let fullText = "";

        excelData = [];

        for(let pageNum = 1;
            pageNum <= pdf.numPages;
            pageNum++){

            const page =
            await pdf.getPage(pageNum);

            const textContent =
            await page.getTextContent();

            const textItems =
            textContent.items.map(
                item => item.str
            );

            fullText +=
            textItems.join(" ") + "\n";

            excelData.push(textItems);
        }

        document.getElementById("preview").value =
        fullText;
    };

    reader.readAsArrayBuffer(file);
}

/* DOWNLOAD EXCEL */

function downloadExcel(){

    if(excelData.length === 0){

        alert("No PDF data found");

        return;
    }

    const worksheet =
    XLSX.utils.aoa_to_sheet(excelData);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "PDF Data"
    );

    XLSX.writeFile(
        workbook,
        "converted.xlsx"
    );
}

</script>

</body>
</html>
