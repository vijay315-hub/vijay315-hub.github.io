<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clerk Government Jobs 2026 | Latest Clerk Vacancy India</title>
<meta name="description" content="Find latest clerk government jobs in India including SSC, railway and bank clerk vacancies.">
<meta name="keywords" content="clerk jobs, government clerk vacancy, SSC clerk jobs, bank clerk jobs 2026">
<link rel="canonical" href="https://vijay315-hub.github.io/clerk-jobs.html">
<meta name="robots" content="index, follow">

<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
header{background:#111827;color:white;padding:20px;text-align:center;}
.container{width:90%;max-width:850px;margin:auto;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;}
.btn{background:#111827;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;}
</style>
</head>

<body>

<header>
<h1>Clerk Government Jobs 2026</h1>
<p>Latest clerk vacancies in India</p>
</header>

<div class="container" id="jobs">Loading...</div>

<script>
const sheetURL = "YOUR GOOGLE SHEET CSV LINK";

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    let rows = data.split("\n").slice(1);
    let html = "";

    rows.forEach(row=>{
        let col = row.split(",");
        if(col[0].toLowerCase().includes("clerk")){
            html += `
            <div class="card">
              <h3>${col[0]}</h3>
              <p>${col[1]}</p>
              <a class="btn" href="${col[2]}" target="_blank">Apply</a>
            </div>`;
        }
    });

    document.getElementById("jobs").innerHTML = html || "No Clerk Jobs Found";
});
</script>

</body>
</html>
