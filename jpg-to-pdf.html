<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<title>JPG to PDF Converter Free Online | Convert Image to PDF</title>
<meta name="description" content="Convert JPG to PDF online free. Fast, secure and easy image to PDF converter tool. No upload required.">
<meta name="keywords" content="jpg to pdf, image to pdf converter, free pdf tool">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://vijay315-hub.github.io/jpg-to-pdf.html">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family:Arial;
    background:#f4f6f8;
    margin:0;
}

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    width:90%;
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}

input{
    margin-top:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#111827;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#22c55e;
}

.preview img{
    width:100%;
    margin-top:15px;
    border-radius:10px;
}

.download-btn{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#111827;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🖼 JPG to PDF Converter</h1>
<p>Free & Fast Image to PDF Tool</p>
</header>

<div class="container">

<input type="file" id="imageFile" accept="image/*" multiple>

<button onclick="convertToPDF()">
Convert to PDF
</button>

<div class="preview" id="preview"></div>

<div style="text-align:center;">
<a class="download-btn" href="pdf-tools.html">
⬅ Back to PDF Tools
</a>
</div>

</div>

<script>

const fileInput = document.getElementById("imageFile");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", () => {
    preview.innerHTML = "";

    const files = fileInput.files;

    for(let i=0; i<files.length; i++){
        const reader = new FileReader();

        reader.onload = function(e){
            const img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        }

        reader.readAsDataURL(files[i]);
    }
});

async function convertToPDF(){

    const files = fileInput.files;

    if(files.length === 0){
        alert("Please select at least one image");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    for(let i=0; i<files.length; i++){

        const file = files[i];

        if(!file.type.startsWith("image/")){
            alert("Only image files allowed");
            return;
        }

        const reader = new FileReader();

        await new Promise((resolve) => {

            reader.onload = function(e){

                const img = new Image();
                img.src = e.target.result;

                img.onload = function(){

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (img.height * pdfWidth) / img.width;

                    if(i !== 0){
                        pdf.addPage();
                    }

                    pdf.addImage(img, 'JPEG', 0, 0, pdfWidth, pdfHeight);

                    resolve();
                }
            }

            reader.readAsDataURL(file);
        });
    }

    pdf.save("converted.pdf");
}

</script>

</body>
</html>
