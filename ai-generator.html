<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AI Creator Tools | Vijay Tech Deals
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#1f2937;
padding:30px;
border-radius:16px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:10px;
font-size:34px;
}

.sub{
text-align:center;
color:#d1d5db;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

select,
input,
textarea,
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
margin-top:8px;
}

select,
input,
textarea{
background:#374151;
color:white;
}

textarea{
height:160px;
resize:none;
line-height:1.7;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#16a34a;
}

.copy-btn{
background:#2563eb;
margin-top:8px;
}

.copy-btn:hover{
background:#1d4ed8;
}

.section{
margin-top:30px;
}

.footer{
text-align:center;
margin-top:30px;
color:#9ca3af;
font-size:14px;
}

@media(max-width:768px){

.container{
padding:20px;
}

h1{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>
AI Creator Tools
</h1>

<p class="sub">
Generate AI prompts, titles, hashtags and descriptions instantly.
</p>

<label>
Select Category
</label>

<select id="category">

<option value="Laptop">
Laptop
</option>

<option value="Mobile">
Mobile
</option>

<option value="Accessories">
Accessories
</option>

<option value="Study">
Study Setup
</option>

<option value="Gaming">
Gaming
</option>

</select>

<label>
Enter Product Name
</label>

<input type="text"
id="productName"
placeholder="Example: ASUS Vivobook Laptop">

<!-- PROMPT -->

<div class="section">

<button onclick="generatePrompt()">
Generate AI Prompt
</button>

<textarea id="promptResult"
placeholder="AI prompt will appear here...">
</textarea>

<button class="copy-btn"
onclick="copyText('promptResult')">
Copy Prompt
</button>

</div>

<!-- TITLE -->

<div class="section">

<button onclick="generateTitle()">
Generate YouTube Title
</button>

<textarea id="titleResult"
placeholder="Title will appear here...">
</textarea>

<button class="copy-btn"
onclick="copyText('titleResult')">
Copy Title
</button>

</div>

<!-- TAGS -->

<div class="section">

<button onclick="generateTags()">
Generate Hashtags
</button>

<textarea id="tagResult"
placeholder="Hashtags will appear here...">
</textarea>

<button class="copy-btn"
onclick="copyText('tagResult')">
Copy Hashtags
</button>

</div>

<!-- DESCRIPTION -->

<div class="section">

<button onclick="generateDescription()">
Generate Description
</button>

<textarea id="descriptionResult"
placeholder="Description will appear here...">
</textarea>

<button class="copy-btn"
onclick="copyText('descriptionResult')">
Copy Description
</button>

</div>

<div class="footer">

© 2026 Vijay Tech Deals

</div>

</div>

<script>

/* PROMPT */

function generatePrompt(){

let category =
document.getElementById("category").value;

let product =
document.getElementById("productName").value;

let prompt = "";

if(category === "Laptop"){

prompt =
`Create a modern animated cartoon avatar YouTube Shorts video for ${product}. Show RGB tech room, typing scenes, gaming visuals, and laptop zoom shots. Add text “Best Student Laptop 2026 🔥”. Vertical 9:16 format.`;

}

if(category === "Mobile"){

prompt =
`Create a modern animated cartoon avatar smartphone Shorts video for ${product}. Show smartphone close-up shots, gaming, scrolling social media, and camera showcase in RGB setup. Add text “Best Budget Smartphone 2026 🔥”. Vertical 9:16 format.`;

}

if(category === "Accessories"){

prompt =
`Create a modern cartoon student accessories Shorts video for ${product}. Show aesthetic desk setup, RGB lights, productivity scenes, and smooth transitions. Add text “Best Student Accessories 2026 🔥”.`;

}

if(category === "Study"){

prompt =
`Create a modern study setup Shorts video for ${product}. Show aesthetic study desk, productivity visuals, notebooks, laptop setup, and RGB lighting. Add text “Best Study Setup 2026 🔥”.`;

}

if(category === "Gaming"){

prompt =
`Create a cinematic gaming setup Shorts video for ${product}. Show RGB gaming room, keyboard lighting, and gaming scenes with smooth transitions.`;

}

document.getElementById("promptResult").value = prompt;

}

/* TITLE */

function generateTitle(){

let category =
document.getElementById("category").value;

let product =
document.getElementById("productName").value;

let title = "";

if(category === "Laptop"){

title =
`Best ${product} Laptop Under ₹70000 🔥 #shorts`;

}

if(category === "Mobile"){

title =
`${product} Best Budget Phone 2026 🔥 #shorts`;

}

if(category === "Accessories"){

title =
`Best Student Accessories 2026 🔥`;

}

if(category === "Study"){

title =
`Best Study Setup 2026 🔥`;

}

if(category === "Gaming"){

title =
`Ultimate Gaming Setup 2026 🔥`;

}

document.getElementById("titleResult").value = title;

}

/* TAGS */

function generateTags(){

let category =
document.getElementById("category").value;

let tags = "";

if(category === "Laptop"){

tags =
"#laptop #studentlaptop #asus #tech #shorts";

}

if(category === "Mobile"){

tags =
"#mobile #smartphone #budgetphone #tech #shorts";

}

if(category === "Accessories"){

tags =
"#studysetup #desksetup #student #shorts";

}

if(category === "Study"){

tags =
"#studysetup #productivity #students #shorts";

}

if(category === "Gaming"){

tags =
"#gaming #gamingsetup #rgb #shorts";

}

document.getElementById("tagResult").value = tags;

}

/* DESCRIPTION */

function generateDescription(){

let product =
document.getElementById("productName").value;

let desc =
`🔥 Check out ${product} for students and creators.

Best deals available now.

Visit Website:
https://vijay315-hub.github.io

#shorts`;

document.getElementById("descriptionResult").value = desc;

}

/* COPY */

function copyText(id){

let copyText =
document.getElementById(id);

copyText.select();

document.execCommand("copy");

alert("Copied!");

}

</script>

</body>

</html>
