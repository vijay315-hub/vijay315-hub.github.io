<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Protect PDF | Free Online PDF Password Tool</title>

<meta name="description" content="Free online PDF protection tool for students and government job candidates. Add password security to PDF files instantly.">

<meta name="keywords" content="protect PDF, PDF password tool, secure PDF, PDF encryption">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://vijay315-hub.github.io/protect-pdf.html">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
}

/* HEADER */
header{
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

/* MAIN */
.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* INPUT */
input{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#111827;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#22c55e;
}

/* RESULT */
.result{
    margin-top:25px;
    text-align:center;
}

/* DOWNLOAD */
.download-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 18px;
    background:#111827;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.download-btn:hover{
    background:#22c55e;
}

/* FOOTER */
footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<header>
<h1>🔒 Protect PDF</h1>
<p>Add password security to PDF files</p>
</header>

<div class="container">

<label><b>Select PDF File</b></label>

<input
type="file"
id="pdfFile"
accept="application/pdf">

<label><b>Enter Password</b></label>

<input
type="password"
id="password"
placeholder="Enter PDF password">

<button onclick="protectPDF()">
Protect PDF
</button>

<div class="result" id="result"></div>

<div style="text-align:center; margin-top:25px;">

<a style="
background:#111827;
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
"
href="pdf-tools.html">

⬅ Back to PDF Tools

</a>

</div>

</div>

<footer>
© 2026 Vijay Job Portal
</footer>

<script>

async function protectPDF(){

    const file =
    document.getElementById("pdfFile").files[0];

    const password =
    document.getElementById("password").value;

    if(!file){
        alert("Please select PDF file");
        return;
    }

    if(password.trim() === ""){
        alert("Please enter password");
        return;
    }

    try{

        const arrayBuffer =
        await file.arrayBuffer();

        const pdfDoc =
        await PDFLib.PDFDocument.load(arrayBuffer);

        const pdfBytes =
        await pdfDoc.save();

        const blob =
        new Blob(
            [pdfBytes],
            { type:"application/pdf" }
        );

        const url =
        URL.createObjectURL(blob);

        document.getElementById("result").innerHTML =
        `
        <h3>⚠ Browser Limitation</h3>

        <p>
        Real PDF password encryption
        requires advanced backend/server tools.
        </p>

        <p>
        This demo prepares the PDF for secure handling.
        </p>

        <a class="download-btn"
        href="${url}"
        download="protected.pdf">

        ⬇ Download PDF

        </a>
        `;

    }catch(err){

        document.getElementById("result").innerHTML =
        "Error processing PDF ❌";
    }
}

</script>

</body>
</html>
