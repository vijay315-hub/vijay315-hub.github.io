<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

let allProducts = [];

/* =========================
FETCH CSV
========================= */

fetch(sheetURL)

.then(response => response.text())

.then(data => {

const rows =
data.trim().split("\n").slice(1);

rows.forEach(row => {

const cols = parseCSV(row);

if(cols.length < 10) return;

allProducts.push({

id: cols[0] || "",

title: cols[1] || "",

image1: cols[2] || "",

image2: cols[3] || "",

image3: cols[4] || "",

price: cols[5] || "",

oldprice: cols[6] || "",

description: cols[7] || "",

category: cols[8]?.toLowerCase() || "",

affiliate: cols[9] || ""

});

});

renderProducts(allProducts);

})

.catch(error => {

document.getElementById("productGrid").innerHTML =
"<h2>Products Failed To Load</h2>";

console.log(error);

});

/* =========================
CSV PARSER
========================= */

function parseCSV(str){

const result = [];

let current = '';

let insideQuotes = false;

for(let i=0;i<str.length;i++){

const char = str[i];

if(char === '"'){

insideQuotes = !insideQuotes;

}

else if(char === ',' && !insideQuotes){

result.push(current.trim());

current='';

}

else{

current += char;

}

}

result.push(current.trim());

return result.map(item =>
item.replace(/^"|"$/g,'')
);

}

/* =========================
RENDER PRODUCTS
========================= */

function renderProducts(products){

let html = "";

if(products.length === 0){

html = "<h2>No Products Found</h2>";

}

products.forEach(product => {

html += `

<div class="product-box">

<img
src="${product.image1}"
alt="${product.title}"

onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">

<h3>
${product.title}
</h3>

<div class="price">

₹${product.price}

<span class="old-price">

₹${product.oldprice}

</span>

</div>

<a class="buy-btn"
href="product-detail.html?id=${product.id}">

View Deal

</a>

</div>

`;

});

document.getElementById("productGrid").innerHTML = html;

}

/* =========================
SEARCH
========================= */

function searchProducts(){

let value =
document.getElementById("productSearch")
.value
.toLowerCase()
.trim();

/* UNDER PRICE */

if(value.includes("under")){

let amount =
parseInt(value.replace(/[^\d]/g,''));

let filtered =
allProducts.filter(product => {

let price =
parseInt(
product.price.replace(/[^\d]/g,'')
);

return price <= amount;

});

renderProducts(filtered);

}

/* NORMAL SEARCH */

else{

let filtered =
allProducts.filter(product =>

product.title.toLowerCase().includes(value)

||

product.description.toLowerCase().includes(value)

||

product.category.toLowerCase().includes(value)

);

renderProducts(filtered);

}

}

/* ENTER KEY */

document.getElementById("productSearch")
.addEventListener("keyup", function(e){

if(e.key === "Enter"){

searchProducts();

}

});

/* =========================
SEARCH SUGGESTIONS
========================= */

const suggestions = [

"under 30000",
"under 50000",
"under 70000",

"HP laptop",
"Dell laptop",
"ASUS laptop",

"gaming laptop",
"student laptop",

"mobile",
"headphones",
"watch"

];

const searchInput =
document.getElementById("productSearch");

const suggestionsBox =
document.getElementById("suggestionsBox");

searchInput.addEventListener("input", function(){

let value =
this.value.toLowerCase().trim();

suggestionsBox.innerHTML = "";

if(value === ""){

suggestionsBox.style.display = "none";

return;

}

let filtered =
suggestions.filter(item =>

item.toLowerCase().includes(value)

);

if(filtered.length > 0){

suggestionsBox.style.display = "block";

filtered.forEach(item => {

let div =
document.createElement("div");

div.classList.add("suggestion-item");

div.innerText = item;

div.onclick = function(){

searchInput.value = item;

suggestionsBox.style.display = "none";

searchProducts();

};

suggestionsBox.appendChild(div);

});

}

else{

suggestionsBox.style.display = "none";

}

});

/* HIDE BOX */

document.addEventListener("click", function(e){

if(

!searchInput.contains(e.target)

&&

!suggestionsBox.contains(e.target)

){

suggestionsBox.style.display = "none";

}

});

</script>
