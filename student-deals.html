<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

let allProducts = [];

fetch(sheetURL)

.then(response => response.text())

.then(csv => {

const rows = csv.split("\n").slice(1);

rows.forEach(row => {

/* SAFE CSV SPLIT */

const cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols || cols.length < 10) return;

/* REMOVE " */

const cleanCols =
cols.map(col =>
col.replace(/^"|"$/g,'').trim()
);

/* SKIP EMPTY */

if(!cleanCols[1]) return;

allProducts.push({

id: cleanCols[0],

title: cleanCols[1],

image1: cleanCols[2],

image2: cleanCols[3],

image3: cleanCols[4],

price: cleanCols[5],

oldprice: cleanCols[6],

description: cleanCols[7],

category: cleanCols[8].toLowerCase(),

affiliate: cleanCols[9]

});

});

renderProducts(allProducts);

});

/* RENDER */

function renderProducts(products){

let html = "";

products.forEach(product => {

html += `

<div class="product-box">

<img src="${product.image1}"
alt="${product.title}"

onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">

<h3>
${product.title}
</h3>

<div class="price">

₹${product.price}

<span class="old-price">

₹${product.oldprice}

</span>

</div>

<a class="buy-btn"
href="product-detail.html?id=${product.id}">

View Deal

</a>

</div>

`;

});

document.getElementById("productGrid").innerHTML = html;

}

</script>
