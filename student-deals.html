<script>

/* GOOGLE SHEET */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRX-wrlF5tmoY9e3vjobu5Y-7NI-6OFduc8E3V-fILbv0K3Zq4TQQgNgIfePNrQxza4xRH_o1ZLya_q/pub?output=csv";

let allProducts = [];

/* FETCH */

fetch(sheetURL)

.then(res => res.text())

.then(data => {

let rows =
data.trim().split("\n").slice(1);

rows.forEach(row => {

let cols =
row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

if(!cols) return;

allProducts.push({

id: cols[0]?.replace(/"/g,"") || "",

title: cols[1]?.replace(/"/g,"") || "",

image1: cols[2]?.replace(/"/g,"") || "",

price: cols[5]?.replace(/"/g,"") || "",

oldprice: cols[6]?.replace(/"/g,"") || "",

description: cols[7]?.replace(/"/g,"") || "",

category: cols[8]?.replace(/"/g,"") || ""

});

});

/* SHOW ALL PRODUCTS */

renderProducts(allProducts);

});

/* RENDER */

function renderProducts(products){

let html = "";

products.forEach(product => {

html += `

<div class="product-box">

<img src="${product.image1}"
alt="${product.title}">

<h3>${product.title}</h3>

<div class="price">

${product.price}

<span class="old-price">

${product.oldprice}

</span>

</div>

<a href="product-detail.html?id=${product.id}"
class="buy-btn">

View Deal

</a>

</div>

`;

});

document.getElementById("productGrid")
.innerHTML = html;

}

/* SMART SEARCH */

function searchProducts(){

let value =
document.getElementById("productSearch")
.value.toLowerCase().trim();

/* UNDER PRICE */

if(value.includes("under")){

let amount =
parseInt(value.replace(/[^\d]/g,''));

let filtered =
allProducts.filter(product => {

let price =
parseInt(
product.price.replace(/[^\d]/g,'')
);

return price <= amount;

});

renderProducts(filtered);

}

/* NORMAL SEARCH */

else{

let filtered =
allProducts.filter(product =>

product.title.toLowerCase()
.includes(value)

||

product.description.toLowerCase()
.includes(value)

||

product.id.toLowerCase()
.includes(value)

);

renderProducts(filtered);

}

}

/* ENTER */

document.getElementById("productSearch")
.addEventListener("keyup", function(event){

if(event.key === "Enter"){

searchProducts();

}

});

/* SEARCH SUGGESTIONS */

const suggestions = [

"under 30000",
"under 50000",
"under 70000",

"HP laptop",
"Dell laptop",
"ASUS laptop",

"gaming laptop",
"student laptop"

];

const searchInput =
document.getElementById("productSearch");

const suggestionsBox =
document.getElementById("suggestionsBox");

/* INPUT */

searchInput.addEventListener("input", function(){

let value =
this.value.toLowerCase().trim();

suggestionsBox.innerHTML = "";

if(value === ""){

suggestionsBox.style.display = "none";

return;

}

let filtered =
suggestions.filter(item =>

item.toLowerCase().includes(value)

);

if(filtered.length > 0){

suggestionsBox.style.display = "block";

filtered.forEach(item => {

let div =
document.createElement("div");

div.classList.add("suggestion-item");

div.innerText = item;

div.onclick = function(){

searchInput.value = item;

suggestionsBox.style.display = "none";

searchProducts();

};

suggestionsBox.appendChild(div);

});

}else{

suggestionsBox.style.display = "none";

}

});

/* HIDE */

document.addEventListener("click", function(e){

if(!searchInput.contains(e.target)
&& !suggestionsBox.contains(e.target)){

suggestionsBox.style.display = "none";

}

});

</script>
