<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today News</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f4f6f8;
}

header{
    background:#111827;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    margin:20px auto;
}

.news-card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.news-card h2{
    color:#111827;
}

.news-card p{
    color:#4b5563;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 14px;
    background:#111827;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.btn:hover{
    background:#22c55e;
}

</style>

</head>

<body>

<header>

<h1>Today Latest News 📰</h1>

<p>Live news updates</p>

</header>

<div class="container" id="news">

Loading latest news...

</div>

<script>

const rssURL =
"https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en";

fetch(rssURL)

.then(res => res.json())

.then(data => {

    let html = "";

    data.items.slice(0,10).forEach(news => {

        html += `

        <div class="news-card">

            <h2>${news.title}</h2>

            <p>${news.pubDate}</p>

            <a class="btn"
            href="${news.link}"
            target="_blank">
            Read Full News
            </a>

        </div>

        `;

    });

    document.getElementById("news").innerHTML = html;

})

.catch(err => {

    document.getElementById("news").innerHTML =
    "Unable to load news";

});

</script>

</body>
</html>
