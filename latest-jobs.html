<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Latest Government Jobs 2026</title>
<meta name="description" content="Find latest government jobs in India 2026. Get daily job notifications for SSC, railway, banking and Gujarat jobs.">

<meta name="keywords" content="latest government jobs, govt jobs 2026, today job notification, new govt jobs India, latest vacancy India">

<link rel="canonical" href="https://vijay315-hub.github.io/latest-jobs.html">
<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}

header{
    background:#111827;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:850px;
    margin:auto;
}

.card{
    background:white;
    padding:18px;
    margin:12px 0;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

..btn{
    background:#111827;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    text-decoration:none;
    margin-right:5px;
    display:inline-block;
    font-size:13px;
}

.btn:hover{
    background:#22c55e;
}
footer{
    text-align:center;
    padding:20px;
    color:#6b7280;   
}   
</style>
</head>

<body>
<div style="text-align:center; margin:10px;">
  <a class="btn" href="index.html">⬅ Back to Home</a>
</div>
<header>
<h1>Latest Government Jobs</h1>
<p>Newest job updates across India</p>
</header>

<div class="container" id="jobs">Loading...</div>
<footer>© 2026 Job Portal</footer>
<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);
    let html = "";

    // show latest first
    rows.reverse();

    rows.forEach(row => {

        let cols = row.split(",");

        let title = cols[0] || "";
        let desc = cols[1] || "";
        let link = cols[2] || "";
        let date = cols[3] || "";
        let pdf  = cols[4] || "";

        let pdfBtn = pdf ? `<a class="btn" href="${pdf}" target="_blank">PDF</a>` : "";

        html += `
        <div class="card">
            <h3>${title}</h3>
            <p>${desc}</p>
            <small>${date}</small><br>
            <a class="btn" href="${link}" target="_blank">Apply</a>
            ${pdfBtn}
        </div>
        `;
    });

    document.getElementById("jobs").innerHTML = html;
});

</script>

</body>
</html>
